include hyde.conf
# Kitty config with animations and visual enhancements

font_family JetBrainsMono Nerd Font
font_size 13

# Enable cursor blinking
cursor_blink_interval 0
cursor_stop_blinking_after 0

# Smooth scrolling
scrollback_lines 10000
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Visual effects
draw_minimal_borders no
bell_path /usr/share/sounds/freedesktop/stereo/bell.oga

# Window opacity
background_opacity 0.75

# Cursor style with trail animation
cursor_shape beam
cursor_beam_thickness 1.5
cursor_trail 1

# Tab bar
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted

# Scrollbar
scrollbar_width 1

# Mouse
copy_on_select yes
strip_trailing_spaces always

# Color scheme (Catppuccin Mocha)
foreground #cdd6f4
background #000000
selection_foreground #1e1e2e
selection_background #45475a

color0 #45475a
color1 #f38ba8
color2 #a6e3a1
color3 #f9e2af
color4 #89b4fa
color5 #f5c2e7
color6 #94e2d5
color7 #bac2de
color8 #585b70
color9 #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #a6adc8

# URL handling
detect_urls yes
url_style curly
open_url_with default

# Shell
shell /usr/bin/zsh
